kind: government
description: The Bureau of Justice Statistics (BJS) is the agency within the U.S. Department of Justice responsible for collecting,
  analysing, and disseminating crime, criminal-justice, expenditure, and victimisation data. BJS exposes selected datasets
  through Socrata Open Data APIs and offers interactive data analysis tools such as the Justice Expenditure and Employment
  Tool (JEET) and the National Crime Victimization Survey (NCVS) Quick Tables.
apis:
- aid: data-analysis-tools-bureau-of-justice-statistics:ncvs-api
  name: BJS NCVS API
  description: The National Crime Victimization Survey (NCVS) API exposes selected NCVS datasets via the Socrata Open Data
    API. Datasets are addressed by four-character resource codes and may be queried with SoQL clauses such as $select, $where,
    $group, $order, and $limit, returning JSON or CSV.
  humanURL: https://bjs.ojp.gov/national-crime-victimization-survey-ncvs-api
  baseURL: https://api.ojp.gov/bjsdataset/v1
