- aid: data-analysis-tools-bureau-of-justice-statistics:nibrs-api
  name: BJS NIBRS National Estimates API
  description: The NIBRS National Estimates API publishes selected National Incident-Based Reporting System national-estimates
    datasets via the Socrata Open Data API, addressable via four-character resource codes and queryable with SoQL.
  humanURL: https://bjs.ojp.gov/national-incident-based-reporting-system-nibrs-national-estimates-api
